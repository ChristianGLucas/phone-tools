name: christiangeorgelucas/phone-tools
version: 0.1.1
language: typescript
description: Composable phone-number nodes — parse, validate, format (E.164/national/international/RFC3966), extract from free text, and look up region dialing metadata. Offline and deterministic, wrapping libphonenumber-js.
nodes:
    - name: Parse
      input: ParseInput
      output: PhoneNumber
    - name: Validate
      input: ValidateInput
      output: Validation
    - name: Format
      input: FormatInput
      output: Formatted
    - name: Extract
      input: ExtractInput
      output: Extracted
    - name: CountryInfo
      input: CountryInfoInput
      output: CountryInfo
